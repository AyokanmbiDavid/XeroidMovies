<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeroid - Movie Discovery</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --blur: blur(20px);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg);
            overflow-x: hidden;
        }

        /* Loading Animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-fast {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Glass Effects */
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Movie Entrance Animation */
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide Scrollbar for clean look */
        #movie-container::-webkit-scrollbar {
            display: none;
        }

        /* Mobile Keyboard Fix */
        @media screen and (max-height: 500px) {
            .bottom-nav { display: none; }
        }
    </style>
</head>

<body class="h-screen flex flex-col relative">
    
    <nav class="fixed top-0 left-0 w-full p-3 flex justify-between items-center glass-nav z-50">
        <div class="text-sm font-bold px-4 py-1.5 rounded-full bg-gradient-to-r from-blue-600 to-blue-900 text-white flex items-center gap-2 shadow-lg shadow-blue-200">
            <i class="fa-solid fa-clapperboard text-xs"></i>
            Xeroid
        </div>

        <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-full border border-gray-100">
            <button id="pageprevious" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm text-gray-400 hover:text-blue-600 transition-all">
                <i class="fa-solid fa-chevron-left text-[10px]"></i>
            </button>
            <span id="pagenumber" class="text-xs font-semibold px-2">1</span>
            <button id="pagenext" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm text-gray-700 hover:text-blue-600 transition-all">
                <i class="fa-solid fa-chevron-right text-[10px]"></i>
            </button>
        </div>
        
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-600">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
    </nav>
    
    <main class="mt-20 flex-grow w-full px-4 flex flex-col items-center relative overflow-y-auto">
    
        <div class="w-full relative px-2 mb-6 max-w-sm">
            <input id="searchInput" placeholder="Search for a show..." class="w-full text-xs p-4 bg-white border border-gray-200 rounded-full outline-none focus:border-blue-300 shadow-sm transition-all">
            <button id="searchBtn" class="absolute right-4 top-1/2 -translate-y-1/2 p-3 text-blue-600">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="loader" class="hidden w-full max-w-sm px-4 animate-pulse-fast">
            <div class="w-full aspect-[2/3] bg-gray-200 rounded-[2rem] mb-6"></div>
            <div class="h-8 bg-gray-200 rounded-full w-3/4 mb-4"></div>
            <div class="flex gap-2 mb-8">
                <div class="h-5 bg-gray-100 rounded-full w-16"></div>
                <div class="h-5 bg-gray-100 rounded-full w-20"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8 py-6 border-y border-gray-100">
                <div class="space-y-2"><div class="h-3 bg-gray-100 rounded w-1/2"></div><div class="h-4 bg-gray-200 rounded w-3/4"></div></div>
                <div class="space-y-2"><div class="h-3 bg-gray-100 rounded w-1/2"></div><div class="h-4 bg-gray-200 rounded w-3/4"></div></div>
            </div>
        </div>

        <div id="movie-container" class="w-full max-w-sm">
            <div class="text-center mt-20 text-gray-400 text-sm animate-pulse">Searching for something fresh...</div>
        </div>
    </main>

    <div class="bottom-nav w-full flex justify-around items-center fixed bottom-0 left-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 pb-8 z-50">
        <button class="text-gray-400 hover:text-blue-600 transition-colors">
            <i class="fa-solid fa-list-ul text-xl"></i>
        </button>

        <button onclick="location.reload()" class="p-5 px-6 bg-gradient-to-tr from-blue-600 to-blue-800 rounded-full shadow-xl shadow-blue-300 -mt-14 text-white border-4 border-white active:scale-90 transition-transform">
            <i class="fa-solid fa-house text-xl"></i>
        </button>
      
        <button class="text-gray-400 hover:text-blue-600 transition-colors">
            <i class="fa-solid fa-circle-arrow-down text-xl"></i>
        </button>
    </div>

    <script>
        const $ = document.getElementById.bind(document);

        const UI = {
            input: $('searchInput'),
            btn: $('searchBtn'),
            loader: $('loader'),
            container: $('movie-container'),
            pageText: $('pagenumber'),
            nextBtn: $('pagenext'),
            prevBtn: $('pageprevious')
        };

        let movies = []; 
        let currentIndex = 0;

        // Auto-search on load
        document.addEventListener("DOMContentLoaded", () => {
            searchMovies('anime');
        });

        async function searchMovies(query) {
            if (!query) return;
            
            // Toggle Loading State
            UI.loader.classList.remove('hidden'); 
            UI.container.classList.add('hidden');
            
            try {
                const response = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                movies = data;
                currentIndex = 0;
                
                if (movies.length === 0) {
                    UI.container.innerHTML = `<p class="text-center text-gray-400 mt-20">No results found for "${query}".</p>`;
                } else {
                    updateUI();
                }
            } catch (error) {
                UI.container.innerHTML = `<p class="text-center text-red-400 mt-20">Connection Error. Please check your internet.</p>`;
            } finally {
                UI.loader.classList.add('hidden');
                UI.container.classList.remove('hidden');
            }
        }

        function renderMovie() {
            const item = movies[currentIndex].show;
            const poster = item.image ? item.image.original : 'https://via.placeholder.com/600x800?text=No+Image+Found';

            UI.container.innerHTML = `
                <div class="animate-fade-in px-2 pb-32">
                    <div class="relative rounded-[2rem] overflow-hidden shadow-2xl bg-gray-200 aspect-[2/3] mb-8">
                        <img src="${poster}" class="w-full h-full object-cover" alt="${item.name}">
                        <div class="absolute top-5 left-5">
                            <span class="bg-black/40 backdrop-blur-md text-white text-[10px] font-bold px-3 py-1.5 rounded-full border border-white/20 uppercase tracking-tighter">
                                ${item.language || 'Global'}
                            </span>
                        </div>
                    </div>

                    <div class="text-left px-2">
                        <h2 class="text-3xl font-bold text-gray-900 mb-3 leading-tight tracking-tight">${item.name}</h2>
                        
                        <div class="flex gap-2 mb-6 flex-wrap">
                            <span class="bg-blue-100 text-blue-700 text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-wider">${item.type}</span>
                            ${item.genres.map(g => `<span class="bg-gray-100 text-gray-500 text-[10px] px-3 py-1 rounded-full font-medium">#${g}</span>`).join('')}
                        </div>

                        <div class="grid grid-cols-2 gap-y-6 mb-8 py-6 border-y border-gray-100">
                            <div>
                                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mb-1">Status</p>
                                <p class="text-gray-800 text-sm font-semibold">${item.status}</p>
                            </div>
                            <div>
                                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mb-1">Rating</p>
                                <p class="text-blue-600 text-sm font-bold">★ ${item.rating?.average || 'N/A'}</p>
                            </div>
                        </div>

                        <div class="mb-8">
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Storyline</h3>
                            <p class="text-gray-600 text-sm leading-relaxed">
                                ${item.summary ? item.summary.replace(/<[^>]*>/g, '') : 'A mysterious show with no description provided yet.'}
                            </p>
                        </div>

                        <button class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-800 text-white font-bold rounded-[1.5rem] text-sm shadow-xl shadow-blue-200 active:scale-95 transition-transform mb-4">
                            <i class="fa-solid fa-play mr-2"></i> Watch Now
                        </button>
                    </div>
                </div>
            `;
            // Scroll main container to top
            document.querySelector('main').scrollTop = 0;
        }

        function updateUI() {
            if (movies.length > 0) {
                renderMovie();
                UI.pageText.textContent = currentIndex + 1;
                
                // Pagination Buttons Control
                UI.prevBtn.style.opacity = currentIndex === 0 ? "0.3" : "1";
                UI.prevBtn.style.pointerEvents = currentIndex === 0 ? "none" : "auto";
                UI.nextBtn.style.opacity = currentIndex === movies.length - 1 ? "0.3" : "1";
                UI.nextBtn.style.pointerEvents = currentIndex === movies.length - 1 ? "none" : "auto";
            }
        }

        // Listeners
        UI.btn.addEventListener('click', () => searchMovies(UI.input.value));
        UI.input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMovies(UI.input.value);
        });

        UI.nextBtn.addEventListener("click", () => {
            if (currentIndex < movies.length - 1) {
                currentIndex++;
                updateUI();
            }
        });

        UI.prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        });
    </script>
</body>
</html>
