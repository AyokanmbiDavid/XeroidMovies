<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeroid - Discovery</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col relative bg-[#f8fafc]">
    
    <nav class="fixed top-0 left-0 w-full p-3 flex justify-between items-center glass-nav z-50">
        <div class="text-sm font-bold px-4 py-1.5 rounded-full bg-gradient-to-r from-blue-600 to-blue-900 text-white flex items-center gap-2 shadow-lg">
            <i class="fa-solid fa-clapperboard text-xs"></i> Xeroid
        </div>
        <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-full border border-gray-100">
            <button id="pageprevious" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm text-gray-400 hover:text-blue-600 active:scale-90 transition-all">
                <i class="fa-solid fa-chevron-left text-[10px]"></i>
            </button>
            <span id="pagenumber" class="text-xs font-bold px-2 text-gray-700">1</span>
            <button id="pagenext" class="w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm text-gray-700 hover:text-blue-600 active:scale-90 transition-all">
                <i class="fa-solid fa-chevron-right text-[10px]"></i>
            </button>
        </div>
        <button class="w-10 h-10 rounded-full bg-gray-50 text-gray-600 active:scale-90">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>
    </nav>

    <main class="mt-20 flex-grow w-full px-4 flex flex-col items-center relative overflow-y-auto">
        <div class="w-full relative px-2 mb-6 max-w-sm">
            <input id="searchInput" placeholder="Search for movies..." class="w-full text-xs p-4 bg-white border border-gray-200 rounded-full outline-none focus:border-blue-400 shadow-sm pl-5 transition-all">
            <button id="searchBtn" class="absolute right-4 top-1/2 -translate-y-1/2 p-3 text-blue-600 active:scale-90 transition-transform">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="loader" class="hidden w-full max-w-sm px-4 animate-pulse-fast">
            <div class="w-full aspect-[2/3] bg-gray-200 rounded-[2.5rem] mb-6 shadow-sm"></div>
            <div class="h-8 bg-gray-200 rounded-full w-3/4 mb-3"></div>
            <div class="h-4 bg-gray-100 rounded-full w-1/2"></div>
        </div>

        <div id="movie-container" class="w-full max-w-sm"></div>
    </main>

    <div class="bottom-nav w-full flex justify-around items-center fixed bottom-0 left-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 pb-8 z-50">
        <a href="savelist.html" class="text-gray-400 hover:text-red-500 transition-colors active:scale-90">
            <i class="fa-solid fa-heart text-xl"></i>
        </a>
        <button id="homeBtn" onclick="location.reload()" class="p-5 px-6 bg-gradient-to-tr from-blue-600 to-blue-800 rounded-full shadow-xl shadow-blue-300 -mt-14 text-white border-4 border-white active:scale-90 transition-transform">
            <i class="fa-solid fa-house text-xl"></i>
        </button>
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="text-gray-400 hover:text-blue-600 transition-colors active:scale-90">
            <i class="fa-solid fa-circle-arrow-up text-xl"></i>
        </button>
    </div>

    <div id="toast" class="toast-hidden fixed top-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full shadow-2xl backdrop-blur-md text-xs font-bold flex items-center gap-2 z-[120] transition-all duration-300">
        <i id="toastIcon" class="fa-solid fa-circle-check"></i>
        <span id="toastMessage">Success</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
