<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeroid | Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        body { font-family: 'Google Sans', sans-serif; background: #F8F9FF; color: #1A1C1E; }
        
        .m3-card { background: #FFFFFF; border-radius: 40px; border: 1px solid #E0E2EC; overflow: hidden; }
        .search-pill { background: #EEF0F6; border-radius: 100px; transition: all 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .search-pill:focus-within { background: #FFFFFF; box-shadow: 0 0 0 2px #0061A4; }

        /* Smooth Bottom Dock */
        .m3-dock { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); 
            border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }
        .nav-item.active { background: #D1E4FF; color: #001D35; width: 64px; border-radius: 16px; }

        /* Animation */
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-hero { animation: slideIn 0.6s cubic-bezier(0.2, 0, 0, 1) forwards; }
        
        #snackbar {
            visibility: hidden; min-width: 280px; background: #2F3033; color: #F1F0F4;
            border-radius: 16px; padding: 16px; position: fixed;
            z-index: 100; left: 50%; bottom: 120px; transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        #snackbar.show { visibility: visible; animation: slideUp 0.4s forwards, fadeOut 0.4s 2.6s forwards; }
        @keyframes slideUp { from { bottom: 80px; opacity: 0; } to { bottom: 120px; opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body class="pb-36">

    <div id="snackbar">
        <span class="material-symbols-rounded text-blue-300" id="snackIcon">info</span>
        <span id="snackText">Action performed</span>
    </div>

    <header class="p-6 sticky top-0 bg-[#F8F9FF]/80 backdrop-blur-lg z-40">
        <div class="max-w-xl mx-auto space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-[#0061A4] rounded-xl flex items-center justify-center text-white">
                        <span class="material-symbols-rounded">movie_filter</span>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">Xeroid</h1>
                </div>
                <div class="flex items-center gap-1 bg-[#EEF0F6] p-1 rounded-full">
                    <button id="prevBtn" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white transition-all">
                        <span class="material-symbols-rounded text-sm">chevron_left</span>
                    </button>
                    <span id="pageCounter" class="text-[10px] font-bold px-2">1</span>
                    <button id="nextBtn" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white transition-all">
                        <span class="material-symbols-rounded text-sm">chevron_right</span>
                    </button>
                </div>
            </div>

            <div class="search-pill flex items-center px-5 py-4 gap-3">
                <span class="material-symbols-rounded text-slate-500">search</span>
                <input type="text" id="searchInput" placeholder="Search for movies or shows..." class="bg-transparent w-full outline-none text-sm font-medium">
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="loader" class="hidden animate-pulse space-y-6">
            <div class="w-full aspect-[3/4] bg-slate-200 rounded-[40px]"></div>
            <div class="h-8 bg-slate-200 rounded-full w-3/4"></div>
        </div>

        <div id="movie-container"></div>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm m3-dock p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center">
            <div class="nav-item active flex items-center justify-center h-8">
                <span class="material-symbols-rounded" style="font-variation-settings: 'FILL' 1">home</span>
            </div>
            <span class="text-[10px] font-bold mt-1">Home</span>
        </a>
        <a href="savelist.html" class="flex flex-col items-center text-slate-500">
            <div class="h-8 flex items-center justify-center">
                <span class="material-symbols-rounded">favorite</span>
            </div>
            <span class="text-[10px] font-bold mt-1">Saved</span>
        </a>
        <a href="#" class="flex flex-col items-center text-slate-500">
            <div class="h-8 flex items-center justify-center">
                <span class="material-symbols-rounded">settings</span>
            </div>
            <span class="text-[10px] font-bold mt-1">Setup</span>
        </a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
