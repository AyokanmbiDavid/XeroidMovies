<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeroid - Details</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f8fafc] text-gray-900 pb-32 min-h-screen relative overflow-x-hidden">

    <div id="detail-bg" class="fixed inset-0 bg-cover bg-center opacity-10 blur-3xl -z-10 scale-125"></div>
    
    <nav class="fixed top-0 left-0 w-full p-4 z-50 flex items-center justify-between glass-nav">
        <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/40 backdrop-blur-md border border-gray-200/50 text-gray-800 active:scale-90 shadow-sm">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <button id="detailSaveBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/40 backdrop-blur-md border border-gray-200/50 text-gray-800 active:scale-90 shadow-sm">
            <i class="fa-solid fa-heart"></i>
        </button>
    </nav>

    <main id="movie-detail-container" class="mt-24 px-5 max-w-lg mx-auto">
        <div class="animate-pulse-fast space-y-8">
            <div class="w-full aspect-video bg-gray-200 rounded-[2.5rem]"></div>
            <div class="h-10 bg-gray-200 rounded-full w-3/4"></div>
        </div>
    </main>

    <div id="toast" class="toast-hidden fixed top-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full shadow-2xl backdrop-blur-md text-xs font-bold flex items-center gap-2 z-[120] transition-all duration-300">
        <i id="toastIcon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toastMessage">Success</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
